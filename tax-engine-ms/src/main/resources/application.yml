spring:
  application:
    name: tax-engine-service
  threads:
      virtual:
        enabled: true

  datasource:
    url: jdbc:postgresql://localhost:5433/tax_db
    username: ${TAX_DB_USER}
    password: ${TAX_DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 20

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: tax-engine-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "tech.investmentms.infrastructure.kafka.event"
        spring.json.use.type.headers: false
        max.poll.records: 10
        fetch.min.bytes: 1
        fetch.max.wait.ms: 500
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
        acks: all
        retries: 3

server:
  port: 8081

topics:
  tax-requests: tax.requests
  tax-results: tax.results

bcb:
  api:
    base-url: https://api.bcb.gov.br
    cdi-endpoint: /dados/serie/bcdata.sgs.12/dados/ultimos/1
    timeout: 5000

aws:
  s3:
    bucket: ${AWS_S3_BUCKET}
    region: us-east-1
    prefix: tax-results/

resilience4j:
  circuitbreaker:
    instances:
      bcb-api:
        sliding-window-size: 10
        failure-rate-threshold: 50
        wait-duration-in-open-state: 30s
        permitted-number-of-calls-in-half-open-state: 3
  retry:
    instances:
      bcb-api:
        max-attempts: 3
        wait-duration: 2s
        exponential-backoff-multiplier: 2
  timelimiter:
    instances:
      bcb-api:
        timeout-duration: 5s

management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics, circuitbreakers
  endpoint:
    health:
      show-details: when-authorized
  health:
    circuitbreakers:
      enabled: true

logging:
  level:
    tech.taxenginems: DEBUG
    org.springframework.kafka: INFO
    org.hibernate.SQL: INFO

---
spring:
  config:
    activate:
      on-profile: docker

  datasource:
    url: jdbc:postgresql://postgres-tax:5432/tax_db

  kafka:
    bootstrap-servers: redpanda:9092

logging:
  level:
    tech.taxenginems: INFO